{% extends "base.html" %}

{% block title %}Server Error - Purposefully Made KC{% endblock %}

{% block content %}
<div class="err-page">
    <div class="container">
        <div class="err-wrap">

            <!-- Ornament -->
            <svg class="err-ornament" width="52" height="10" viewBox="0 0 52 10" fill="none" aria-hidden="true">
                <line x1="0" y1="5" x2="18" y2="5" stroke="var(--terra-cotta)" stroke-width="1" stroke-opacity="0.4"/>
                <circle cx="26" cy="5" r="4" stroke="var(--terra-cotta)" stroke-width="1" stroke-opacity="0.6"/>
                <line x1="34" y1="5" x2="52" y2="5" stroke="var(--terra-cotta)" stroke-width="1" stroke-opacity="0.4"/>
            </svg>

            <span class="err-eyebrow">500 — Server Error</span>
            <h1 class="err-heading">Something Went<br>Wrong on Our End</h1>
            <p class="err-text">We're sorry — something unexpected happened. Our team has been notified. Please try again in a moment.</p>

            <div class="err-actions">
                <a href="{{ url_for('main.index') }}" class="btn btn-primary">Back to Home</a>
                <a href="javascript:history.back()" class="btn btn-outline">Go Back</a>
            </div>
